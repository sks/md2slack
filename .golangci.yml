version: "2"

run:
  timeout: 3m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - revive
    - unparam
    - prealloc
    - unconvert
    - nakedret
    - nolintlint
    - copyloopvar
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    govet:
      enable-all: true
      disable:
        - fieldalignment
  exclusions:
    presets:
      - std-error-handling

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
